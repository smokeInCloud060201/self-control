

services:
  proxy:
    image: self-control-proxy:latest
    container_name: self-control-proxy
    environment:
      - PROXY_PORT=8080
    ports:
      - "8080:8080"
    networks:
      - self-control
  web:
    image: self-control-web:latest
    container_name: self-control-web
    ports:
      - "8082:80"
    networks:
      - self-control

networks:
  self-control:
    driver: bridge