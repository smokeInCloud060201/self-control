

services:
  proxy:
    image: self-control-proxy:latest
    container_name: self-control-proxy
    environment:
      - PROXY_PORT=8080
    ports:
      - "8080:8080"
    networks:
      - self-control
  agent:
    image: self-control-agent:latest
    container_name: self-control-agent
    environment:
      - PROXY_PORT=8080
      - PROXY_SERVER=proxy
    ports:
      - "8081:8081"
    networks:
      - self-control
  web:
    image: self-control-web:latest
    container_name: self-control-web
    ports:
      - "8082:80"
    networks:
      - self-control
    
networks:
  self-control:
    driver: bridge